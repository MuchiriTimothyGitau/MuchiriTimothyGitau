<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#f0883e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- outer ring -->
  <circle cx="110" cy="110" r="104" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.6"/>

  <!-- inner circle -->
  <circle cx="110" cy="110" r="100" fill="url(#bg)"/>

  <!-- subtle glow top -->
  <ellipse cx="110" cy="60" rx="70" ry="40" fill="url(#glow)"/>

  <!-- terminal window -->
  <rect x="55" y="55" width="110" height="80" rx="6" fill="#1a1a2e" stroke="#30363d" stroke-width="1.5"/>

  <!-- terminal dots -->
  <circle cx="68" cy="69" r="4" fill="#ff7b72"/>
  <circle cx="82" cy="69" r="4" fill="#f0883e"/>
  <circle cx="96" cy="69" r="4" fill="#3fb950"/>

  <!-- terminal line 1: prompt -->
  <text x="60" y="92" font-family="'Courier New',monospace" font-size="11" fill="#8b949e">
    <tspan fill="#58a6ff">visitor@github</tspan>
    <tspan fill="#8b949e">:</tspan>
    <tspan fill="#f0883e">~</tspan>
    <tspan fill="#8b949e">$</tspan>
  </text>

  <!-- terminal line 2: the discreet word -->
  <text x="60" y="112" font-family="'Courier New',monospace" font-size="12" fill="#3fb950" font-weight="bold">
    venegnce
  </text>

  <!-- blinking cursor -->
  <rect x="60" y="116" width="7" height="2" fill="#58a6ff">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- code brackets subtle -->
  <text x="96" y="148" font-family="'Courier New',monospace" font-size="10" fill="#30363d" opacity="0.5">{ ... }</text>

  <!-- MTG watermark bottom -->
  <text x="84" y="168" font-family="'Courier New',monospace" font-size="7" fill="#21262d" letter-spacing="3">MTG</text>
</svg>
